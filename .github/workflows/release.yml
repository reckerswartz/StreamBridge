name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: latest
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg imagemagick zip
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - run: npm run release:check -- --tag="$GITHUB_REF_NAME"
      - run: npm run verify
      - run: npm run release:reproducible
      - uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/*.zip
            artifacts/*.json
            artifacts/SHA256SUMS
      - uses: actions/upload-artifact@v7
        with:
          name: streambridge-${{ github.ref_name }}-release
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* --draft --verify-tag --title "StreamBridge $GITHUB_REF_NAME" --notes-file artifacts/RELEASE_NOTES.md
          fi

  submit-mozilla:
    needs: build-release
    runs-on: ubuntu-latest
    environment: mozilla-production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/download-artifact@v8
        with:
          name: streambridge-${{ github.ref_name }}-release
          path: artifacts
      - run: npm ci
      - run: npm run build
      - name: Submit listed version to Mozilla Add-ons
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: >-
          npx web-ext sign
          --source-dir dist/firefox
          --artifacts-dir artifacts/amo
          --channel listed
          --approval-timeout 0
          --amo-metadata store/mozilla/amo-metadata.json
          --upload-source-code "artifacts/streambridge-${GITHUB_REF_NAME}-source.zip"

  submit-chrome:
    needs: build-release
    runs-on: ubuntu-latest
    environment: chrome-production
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - uses: actions/download-artifact@v8
        with:
          name: streambridge-${{ github.ref_name }}-release
          path: artifacts
      - run: npm ci
      - name: Upload and submit to Chrome Web Store
        env:
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
        run: npm run store:chrome:submit
