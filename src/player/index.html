<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>StreamBridge Player</title>
    <link rel="stylesheet" href="player.css">
  </head>
  <body>
    <main>
      <header>
        <img src="../icons/streambridge-64.png" alt="">
        <div><h1>StreamBridge Player</h1><p id="stream-title">Verified stream</p></div>
      </header>
      <video id="video" controls playsinline></video>
      <button id="start-playback" type="button" hidden>Start playback</button>
      <p id="status" role="status">Loading verified stream…</p>
    </main>
    <script src="player.js"></script>
  </body>
</html>
